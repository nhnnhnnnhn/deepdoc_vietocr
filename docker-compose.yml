services:
  deepdoc-vietocr:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepdoc-vietocr:gpu
    container_name: deepdoc-vietocr
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DEVICE: ${DEVICE:-auto}
      REQUIRE_GPU: ${REQUIRE_GPU:-1}
      OCR_CORRECTION_MEMORY_PATH: ${OCR_CORRECTION_MEMORY_PATH:-/app/web_runs/ocr_correction_memory.json}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility,display}
    ports:
      - "${WEB_PORT:-8008}:8000"
    volumes:
      - deepdoc_input:/app/input
      - deepdoc_output:/app/output
      - deepdoc_web_runs:/app/web_runs
      - deepdoc_log:/app/log
      - /sys/class/drm:/sys/class/drm:ro
    gpus: all
    shm_size: "2gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  deepdoc_input:
  deepdoc_output:
  deepdoc_web_runs:
  deepdoc_log:
